# ===============================================================
# ENDER 3 NG - COMPLETE MENU WITH MODERN MACROS
# ===============================================================
# Full menu with:
# - Klipper advanced tools
# - Modern macros integrated
# - All features accessible from LCD
# ===============================================================

### ===============================================================
### MAIN MENU
### ===============================================================
[menu __main]
type: list
name: === MAIN MENU ===

### ---------------------------------------------------------------
### PRINT CONTROL
### ---------------------------------------------------------------
[menu __main __pause]
type: command
enable: {(printer.print_stats.state == "printing") and ("pause_resume" in printer)}
index: 0
name: > PAUSE printing
gcode:
    PAUSE
    { menu.exit() }

[menu __main __resume]
type: command
enable: {(printer.print_stats.state == "paused") and ("pause_resume" in printer)}
index: 0
name: > RESUME printing
gcode:
    RESUME
    { menu.exit() }

[menu __main __abort]
type: command
enable: {((printer.print_stats.state == "printing" or printer.print_stats.state == "paused")) and ("pause_resume" in printer)}
index: 1
name: X ABORT printing
gcode:
    CANCEL_PRINT
    { menu.exit() }

### ---------------------------------------------------------------
### TUNE
### ---------------------------------------------------------------
[menu __main __tune]
type: list
enable: {printer.idle_timeout.state == "Printing"}
index: 2
name: > Tune

[menu __main __tune __speed]
type: input
name: Speed: {'%3d' % (menu.input*100)}%
input: {printer.gcode_move.speed_factor}
input_min: 0.01
input_max: 5
input_step: 0.01
realtime: True
gcode:
    M220 S{'%d' % (menu.input*100)}

[menu __main __tune __flow]
type: input
name: Flow: {'%3d' % (menu.input*100)}%
input: {printer.gcode_move.extrude_factor}
input_min: 0.01
input_max: 2
input_step: 0.01
realtime: True
gcode:
    M221 S{'%d' % (menu.input*100)}

[menu __main __tune __offsetz]
type: input
name: Offset Z:{'%+06.3f' % menu.input}
input: {printer.gcode_move.homing_origin.z}
input_min: -5
input_max: 5
input_step: 0.005
realtime: True
gcode:
    SET_GCODE_OFFSET Z={'%.3f' % menu.input} MOVE=1

[menu __main __tune __hotend0_target]
type: input
enable: {('extruder' in printer) and ('extruder' in printer.heaters.available_heaters)}
name: {"Ex0:%3.0fC (%4.0fC)" % (menu.input, printer.extruder.temperature)}
input: {printer.extruder.target}
input_min: 0
input_max: {printer.configfile.config.extruder.max_temp}
input_step: 1
realtime: True
gcode: 
    M104 T0 S{'%.0f' % menu.input}

[menu __main __tune __hotbed_target]
type: input
enable: {'heater_bed' in printer}
name: {"Bed:%3.0fC (%4.0fC)" % (menu.input, printer.heater_bed.temperature)}
input: {printer.heater_bed.target}
input_min: 0
input_max: {printer.configfile.config.heater_bed.max_temp}
input_step: 1
realtime: True
gcode: 
    M140 S{'%.0f' % menu.input}

[menu __main __tune __fanspeed]
type: input
enable: {'fan' in printer}
name: Fan speed: {'%3d' % (menu.input*100)}%
input: {printer.fan.speed}
input_min: 0
input_max: 1
input_step: 0.01
realtime: True
gcode:
    M106 S{'%d' % (menu.input*255)}

[menu __main __tune __pressure_advance]
type: input
enable: {'extruder' in printer}
name: PA: {'%.3f' % menu.input}
input: {printer.extruder.pressure_advance}
input_min: 0
input_max: 0.2
input_step: 0.005
realtime: True
gcode:
    SET_PRESSURE_ADVANCE ADVANCE={'%.3f' % menu.input}

### ---------------------------------------------------------------
### PRINT FILES (ex OctoPrint/SD Card)
### ---------------------------------------------------------------
[menu __main __sdcard]
type: vsdlist
enable: {'virtual_sdcard' in printer}
index: 3
name: > Print Files

[menu __main __sdcard __start]
type: command
enable: {('virtual_sdcard' in printer) and printer.virtual_sdcard.file_path and not printer.virtual_sdcard.is_active}
name: > Resume Print
gcode: 
    M24
    { menu.exit() }

### ---------------------------------------------------------------
### CONTROL
### ---------------------------------------------------------------
[menu __main __control]
type: list
enable: {not printer.idle_timeout.state == "Printing"}
index: 4
name: > Control

[menu __main __control __home]
type: command
enable: {not printer.idle_timeout.state == "Printing"}
index: 0
