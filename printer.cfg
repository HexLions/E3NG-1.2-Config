##################################################################################
# Initial Setup
##################################################################################


# See docs/Config_Reference.md for a description of parameters.

[include menu.cfg]    # custom lcd display menu

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_40000B001450415833323520-if00
# serial: /dev/ttyAMA0
# restart_method: command


[virtual_sdcard]
path: ~/printer_data/gcodes
##################################################################################
# X / B Motion Setup
##################################################################################
[stepper_x] # B Motor
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40

# Endstop / homing
endstop_pin: ^PC0
position_endstop: 0
position_max: 235
homing_speed: 50

##--------------------------------------------------------------------

homing_speed: 50  #Max 100
homing_retract_dist: 5
#homing_positive_dir: false

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
#run_current: 0.680
run_current: 0.780
stealthchop_threshold: 999999
#interpolation: True # is default
##################################################################################
# Y / A Motion Setup
##################################################################################
[stepper_y] # A Motor
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40

# Endstop / homing
endstop_pin: ^PC1
position_endstop: 247
position_max: 247
homing_speed: 50
homing_positive_dir: true

##--------------------------------------------------------------------

homing_speed: 50  #Max 100
homing_retract_dist: 5
#homing_positive_dir: false

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
#run_current: 0.680
run_current: 0.780
stealthchop_threshold: 999999
#interpolation: True #true is default

##################################################################################
# Z Motion Setup
##################################################################################
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4 # for 20t on Z motor and 40t on lead screws

endstop_pin: probe:z_virtual_endstop # refers to BLTouch Pin (^PC2)
#position_endstop: 0.0
position_max: 300
position_min: -5
##--------------------------------------------------------------------

homing_speed: 10
second_homing_speed: 5
homing_retract_dist: 5
homing_positive_dir: false  

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.680
stealthchop_threshold: 999999
##################################################################################
# Extruder Motion Setup
##################################################################################
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 600
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040

heater_pin: PC8
sensor_type: Generic 3950
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300

# pressure advance
pressure_advance: 0.025
pressure_advance_smooth_time: 0.03
max_extrude_only_distance: 500.0

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
interpolate: true
run_current: 0.8
hold_current: 0.100
sense_resistor: 0.11
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4
##################################################################################
# Heated Bed 
##################################################################################
[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130
##################################################################################
# Fans
##################################################################################
[heater_fan hotend_fan]
pin: PB15
heater: extruder
heater_temp: 50.0

[controller_fan electronic_enclosure_fan]
pin: PC7
idle_timeout: 60

[fan]
pin: PC6

##################################################################################
# Bed
##################################################################################

[bed_mesh]
speed: 120
mesh_min: 0, 0
mesh_max: 183,181
probe_count: 6,6
algorithm: bicubic

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -36
y_offset: 0
#z_offset: 2.10
stow_on_each_sample: False

[safe_z_home]
home_xy_position: 117, 75 # This sets the head so the BLTouch will probe the exact center
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 10

[display_status]

[pause_resume]


##################################################################################
# Printer Profile
##################################################################################
[printer]
kinematics: corexy
max_velocity: 400
max_accel: 6000
max_z_velocity: 20
max_z_accel: 100

[include TEST_SPEED.cfg]

[include macros.cfg]

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>


[display]
lcd_type: st7920
cs_pin: EXP1_7 
sclk_pin: EXP1_6 
sid_pin: EXP1_8 
encoder_pins: ^EXP1_5, ^EXP1_3 
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[filament_switch_sensor switch_sensor]
switch_pin = !PC15   # <------
pause_on_runout = True
runout_gcode = 
	PAUSE
	M117 Filament switch runout
insert_gcode = 
	M117 Filament switch inserted

