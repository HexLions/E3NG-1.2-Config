### ===============================================================
### PRINT START/END MACROS
### ===============================================================

[gcode_macro START_PRINT]
description: Smart print start with bed mesh, purge line, etc.
gcode:
    # Get parameters from slicer
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    # Pre-heat bed to 80% to speed up
    M140 S{BED_TEMP * 0.8}
    
    # Home all axes
    G28
    
    # Heat bed to full temp and wait
    M190 S{BED_TEMP}
    
    # Load bed mesh if exists, otherwise create new one
    BED_MESH_PROFILE LOAD=default
    
    # Move to purge position
    G1 X0 Y0 Z10 F3000
    
    # Heat nozzle and wait
    M109 S{EXTRUDER_TEMP}
    
    # Purge line
    PURGE_LINE
    
    # Ready message
    M117 Printing...

[gcode_macro END_PRINT]
description: Smart print end with safe parking
gcode:
    # Get current position
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    
    # Calculate safe Z lift
    {% if act_z < (max_z - 20.0) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    
    # Relative positioning
    G91
    
    # Retract and lift Z
    G1 E-2 F2700
    G1 E-2 Z{z_safe} F3000
    
    # Absolute positioning
    G90
    
    # Park nozzle at rear
    G1 X10 Y{printer.toolhead.axis_maximum.y - 10} F3000
    
    # Turn off heaters
    M104 S0  ; hotend
    M140 S0  ; bed
    
    # Turn off fan
    M106 S0
    
    # Disable steppers
    M84
    
    # Done message
    M117 Print Complete!

[gcode_macro PURGE_LINE]
description: Draw purge line at front of bed (Orbiter 2.0 optimized)
gcode:
    SAVE_GCODE_STATE NAME=PURGE_LINE_STATE
    G90  ; Absolute positioning
    G1 Z2.0 F3000  ; Move Z up
    G1 X5 Y20 Z0.3 F5000.0  ; Move to start position
    G1 X5 Y200.0 Z0.3 F1500.0 E15  ; Draw first line
    G1 X5.4 Y200.0 Z0.3 F5000.0  ; Move to side
    G1 X5.4 Y20 Z0.3 F1500.0 E30  ; Draw second line
    G1 Z2.0 F3000  ; Move Z up
    G92 E0  ; Reset extruder
    RESTORE_GCODE_STATE NAME=PURGE_LINE_STATE

### ===============================================================
### PAUSE/RESUME/CANCEL - ENHANCED
### ===============================================================

[gcode_macro PAUSE]
description: Pause print with intelligent filament retraction and safe parking
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
    ##### Read parameters #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    
    ##### Set park position #####
    {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 10.0 %}
    
    ##### Calculate safe lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 10.0) %}
        {% set z_safe = 10.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    
    ##### Save position for resume #####
    SAVE_GCODE_STATE NAME=PAUSE_STATE
    
    ##### Execute pause #####
    PAUSE_BASE
    
    ##### Move to park position #####
    G91  ; Relative positioning
    
    # Retract if extruder is hot enough
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{E} F2100
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}
    
    # Lift Z if homed
    {% if "xyz" in printer.toolhead.homed_axes %}
        G1 Z{z_safe} F900
        G90  ; Absolute positioning
        G1 X{x_park} Y{y_park} F6000
    {% else %}
        {action_respond_info("Printer not homed")}
    {% endif %}
    
    # Disable hotend after 10 minutes (600 seconds)
    SET_IDLE_TIMEOUT TIMEOUT=600
    
    M117 Print Paused

[gcode_macro RESUME]
description: Resume print with intelligent filament prime
rename_existing: RESUME_BASE
gcode:
    ##### Read parameters #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    
    ##### Get velocity parameter if specified #####
    {% if 'VELOCITY' in params|upper %}
        {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
    {% else %}
        {% set get_params = "" %}
    {% endif %}
    
    ##### Prime filament if extruder is hot #####
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G91  ; Relative positioning
        G1 E{E} F2100
        G1 E{E} F2100  ; Extra prime
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}
    
    ##### Restore position #####
    RESTORE_GCODE_STATE NAME=PAUSE_STATE
    
    ##### Resume print #####
    RESUME_BASE {get_params}
    
    # Reset idle timeout
    SET_IDLE_TIMEOUT TIMEOUT=1800
    
    M117 Printing...

[gcode_macro CANCEL_PRINT]
description: Cancel print with safe shutdown
rename_existing: CANCEL_PRINT_BASE
gcode:
    # Calculate safe park position
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 20.0) %}
        {% set z_safe = 20.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    
    # Turn off heaters immediately
    TURN_OFF_HEATERS
    
    # Relative positioning
    G91
    
    # Retract and lift
    G1 E-2 F2700
    G1 Z{z_safe} F900
    
    # Absolute positioning
    G90
    
    # Park at rear
    G1 X10 Y{printer.toolhead.axis_maximum.y - 10} F3000
    
    # Turn off fan
    M106 S0
    
    # Disable steppers
    M84
    
    # Clear bed mesh
    BED_MESH_CLEAR
    
    # Cancel print
    CANCEL_PRINT_BASE
    
    M117 Print Cancelled

### ===============================================================
### FILAMENT MANAGEMENT
### ===============================================================

[gcode_macro FILAMENT_CHANGE]
description: Automated filament change with Orbiter 2.0 optimized settings
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set default_x = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set default_y = printer.toolhead.axis_maximum.y|float / 2 %}
    
    M117 Filament change...
    SAVE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE
    
    # Pause print
    PAUSE
    
    # Move to center for easy access
    G90
    G1 X{default_x} Y{default_y} F3000
    
    # Unload filament (Orbiter 2.0 method)
    UNLOAD_FILAMENT EXTRUDER_TEMP={EXTRUDER_TEMP}
    
    M117 Insert new filament
    M117 Press RESUME when ready

[gcode_macro LOAD_FILAMENT]
description: Load filament with Orbiter 2.0 optimized settings
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(230)|float %}
    {% set PURGE_LENGTH = params.PURGE_LENGTH|default(100)|float %}
    {% set PURGE_SPEED = params.PURGE_SPEED|default(450)|float %}
    
    M117 Loading filament...
    
    # Heat nozzle if needed
    {% if printer.extruder.target < 190 %}
        M104 S{EXTRUDER_TEMP}
        M117 Heating hotend...
    {% endif %}
    
    # Wait for temp
    {% if printer.extruder.temperature < (EXTRUDER_TEMP - 5) %}
        M109 S{EXTRUDER_TEMP}
    {% endif %}
    
    # Load sequence (Orbiter 2.0 optimized)
    M83  ; Relative positioning
    G92 E0
    
    # Fast load to nozzle
    G1 E60 F{PURGE_SPEED}
    
    # Purge old filament
    G1 E{PURGE_LENGTH} F{PURGE_SPEED}
    
    G92 E0
    M400  ; Wait for moves to complete
    
    M117 Filament loaded!
    
[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with Orbiter 2.0 optimized settings
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}
    {% set UNLOAD_DISTANCE = params.UNLOAD_DISTANCE|default(65)|float %}
    
    M117 Unloading filament...
    
    # Heat nozzle if needed
    {% if printer.extruder.target < 190 %}
        M104 S{EXTRUDER_TEMP}
        M117 Heating hotend...
    {% endif %}
    
    # Wait for temp
    {% if printer.extruder.temperature < (EXTRUDER_TEMP - 5) %}
        M109 S{EXTRUDER_TEMP}
    {% endif %}
    
    # Unload sequence (Orbiter 2.0 optimized)
    M83  ; Relative positioning
    G92 E0
    
    # Purge a bit first
    G1 E10 F500
    
    # Extract to cold end
    G1 E-5 F3600
    G4 P2000  ; Wait 2 seconds
    
    # Push back slightly
    G1 E6 F3600
    
    # Final extraction
    G1 E-10 F3600
    G1 E-{UNLOAD_DISTANCE} F300  ; Slow extraction
    
    M400  ; Wait for moves to complete
    G92 E0
    
    M117 Filament unloaded!

### ===============================================================
### BED LEVELING & CALIBRATION
### ===============================================================

[gcode_macro G29]
description: Bed mesh calibration with auto-save
gcode:
    # Home if not homed
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    # Heat bed to printing temp for accurate mesh
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    M190 S{BED_TEMP}
    
    # Create mesh
    M117 Bed Meshing...
    BED_MESH_CALIBRATE
    
    # Save mesh as default
    BED_MESH_PROFILE SAVE=default
    
    # Save config
    SAVE_CONFIG
    
    # Park nozzle
    G1 X117 Y115 Z10 F3000
    
    M117 Mesh Complete

[gcode_macro CALIBRATE_Z_OFFSET]
description: Interactive Z-offset calibration
gcode:
    # Home
    G28
    
    # Move to center
    G1 X117 Y115 F3000
    
    # Move to 0.2mm height
    G1 Z0.2 F600
    
    M117 Adjust Z with LCD
    M117 Save when perfect

[gcode_macro PROBE_ACCURACY_TEST]
description: Test probe accuracy with statistics
gcode:
    # Home
    G28
    
    # Move to center
    G1 X117 Y115 F3000
    
    # Run probe accuracy test
    PROBE_ACCURACY SAMPLES=10
    
    M117 Check console

### ===============================================================
### PRINT STATISTICS & QUICK ACTIONS
### ===============================================================

[gcode_macro PRINT_STATS]
description: Show print statistics
gcode:
    {% set total_time = printer.print_stats.total_duration %}
    {% set print_time = printer.print_stats.print_duration %}
    {% set filament = printer.print_stats.filament_used %}
    
    M117 Stats: {filament|int}mm fil
    { action_respond_info("=== PRINT STATISTICS ===") }
    { action_respond_info("Total Time: %.0fh %.0fm" % (total_time // 3600, (total_time % 3600) // 60)) }
    { action_respond_info("Print Time: %.0fh %.0fm" % (print_time // 3600, (print_time % 3600) // 60)) }
    { action_respond_info("Filament: %.2fm (%.0fmm)" % (filament / 1000, filament)) }
    { action_respond_info("State: %s" % printer.print_stats.state) }

[gcode_macro CURRENT_STATS]
description: Show current print info
gcode:
    {% set print_time = printer.print_stats.print_duration %}
    {% set remain_time = printer.print_stats.print_duration %}
    {% set progress = printer.display_status.progress %}
    
    M117 Progress: {(progress * 100)|int}%
    { action_respond_info("=== CURRENT PRINT ===") }
    { action_respond_info("File: %s" % printer.print_stats.filename) }
    { action_respond_info("Progress: %.1f%%" % (progress * 100)) }
    { action_respond_info("Time: %.0fh %.0fm" % (print_time // 3600, (print_time % 3600) // 60)) }
    { action_respond_info("Layer: %s" % printer.print_stats.info.current_layer|default("N/A")) }

### --- Quick Actions ---
[gcode_macro QUICK_PREHEAT]
description: Preheat to last used temperature
variable_last_extruder_temp: 220
variable_last_bed_temp: 60
gcode:
    M140 S{last_bed_temp}
    M104 S{last_extruder_temp}
    M117 Quick preheat!

[gcode_macro SAVE_PREHEAT_TEMPS]
description: Save current temps for quick preheat
gcode:
    {% set extruder = printer.extruder.target %}
    {% set bed = printer.heater_bed.target %}
    SET_GCODE_VARIABLE MACRO=QUICK_PREHEAT VARIABLE=last_extruder_temp VALUE={extruder}
    SET_GCODE_VARIABLE MACRO=QUICK_PREHEAT VARIABLE=last_bed_temp VALUE={bed}
    M117 Temps saved!

[gcode_macro QUICK_LOAD]
description: Quick load filament at saved temp
variable_load_temp: 230
gcode:
    LOAD_FILAMENT EXTRUDER_TEMP={load_temp}

[gcode_macro QUICK_UNLOAD]
description: Quick unload filament at saved temp
variable_unload_temp: 220
gcode:
    UNLOAD_FILAMENT EXTRUDER_TEMP={unload_temp}

[gcode_macro SET_QUICK_LOAD_TEMP]
description: Set temperature for quick load
gcode:
    {% set temp = params.TEMP|default(230)|float %}
    SET_GCODE_VARIABLE MACRO=QUICK_LOAD VARIABLE=load_temp VALUE={temp}
    M117 Quick load: {temp}C

[gcode_macro SET_QUICK_UNLOAD_TEMP]
description: Set temperature for quick unload
gcode:
    {% set temp = params.TEMP|default(220)|float %}
    SET_GCODE_VARIABLE MACRO=QUICK_UNLOAD VARIABLE=unload_temp VALUE={temp}
    M117 Quick unload: {temp}C

[gcode_macro EMERGENCY_RETRACT]
description: Emergency filament retraction
gcode:
    {% if printer.extruder.can_extrude %}
        M83
        G1 E-10 F3600
        M117 Emergency retract!
    {% else %}
        M117 Extruder too cold!
    {% endif %}

[gcode_macro QUICK_PURGE]
description: Quick purge 10mm
gcode:
    {% if printer.extruder.can_extrude %}
        M83
        G1 E10 F450
        M117 Purged 10mm
    {% else %}
        M117 Extruder too cold!
    {% endif %}

[gcode_macro LAST_PRINT_INFO]
description: Show info about last print
gcode:
    { action_respond_info("=== LAST PRINT ===") }
    { action_respond_info("File: %s" % printer.print_stats.filename) }
    { action_respond_info("State: %s" % printer.print_stats.state) }
