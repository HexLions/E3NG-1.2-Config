# MODERN KLIPPER MACROS - ENDER 3 NG
# ===============================================================
# Advanced macros with:
# - Smart bed leveling with mesh loading
# - Intelligent pause/resume with park position
# - Print start/end automation
# - Filament change automation
# - Nozzle cleaning routines
# - Advanced calibration helpers
