### ===============================================================
### PRESSURE ADVANCE CALIBRATION
### ===============================================================

[gcode_macro PA_CALIBRATE]
description: Pressure Advance calibration pattern (Orbiter 2.0 optimized)
gcode:
    # Parameters
    {% set PA_START = params.PA_START|default(0.0)|float %}
    {% set PA_END = params.PA_END|default(0.1)|float %}
    {% set PA_STEP = params.PA_STEP|default(0.005)|float %}
    
    # Home
    G28
    
    # Heat
    M190 S60
    M109 S230
    
    # Start
    G90
    G1 X10 Y10 Z0.3 F3000
    
    {% set PA_VALUE = PA_START %}
    {% for i in range(((PA_END - PA_START) / PA_STEP)|int) %}
        SET_PRESSURE_ADVANCE ADVANCE={PA_VALUE}
        
        # Print test line (Orbiter speed: 450mm/min = 7.5mm/s)
        G1 X10 Y{10 + i * 5} F3000
        G1 E2 F450
        G1 X100 Y{10 + i * 5} E10 F3000
        G1 E-1 F450
        
        {% set PA_VALUE = PA_VALUE + PA_STEP %}
    {% endfor %}
    
    # Reset
    SET_PRESSURE_ADVANCE ADVANCE=0
    
    M117 PA Test Complete

