### CUSTOM UTILITIES
### ===============================================================

[gcode_macro SET_MATERIAL]
description: Set material-specific settings optimized for Orbiter 2.0
gcode:
    {% set MATERIAL = params.MATERIAL|default("PLA")|string %}
    
    {% if MATERIAL == "PLA" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.035
        M117 Material: PLA (PA=0.035)
    {% elif MATERIAL == "PETG" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.050
        M117 Material: PETG (PA=0.050)
    {% elif MATERIAL == "ABS" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.040
        M117 Material: ABS (PA=0.040)
    {% elif MATERIAL == "ASA" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.042
        M117 Material: ASA (PA=0.042)
    {% elif MATERIAL == "TPU" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.065
        M117 Material: TPU (PA=0.065)
    {% else %}
        M117 Unknown material
    {% endif %}

[gcode_macro CLEAN_NOZZLE]
description: Nozzle cleaning routine (wipe on bed edge)
gcode:
    # Home if needed
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    # Move to front left corner
    G90
    G1 X0 Y0 Z2 F3000
    
    # Wipe motion
    G1 Y20 F3000
    G1 Y0 F3000
    G1 Y20 F3000
    G1 Y0 F3000
    
    # Lift
    G1 Z10 F3000
    
    M117 Nozzle cleaned
